# Auto-format GDScript with gdformat on commit.
#
# One-time setup:  pip install pre-commit  &&  pre-commit install
# Bump version:    pre-commit autoupdate   (then commit the changed rev)
#
# IMPORTANT: `rev` pins the gdtoolkit version. gdformat output can differ between versions,
# so anyone working a fork/branch should use the SAME rev — otherwise we reformat each
# other's code and every merge churns. Keep this in sync with the fork maintainer AND with
# whatever `gdformat --version` reports locally (currently 4.5.0).
#
# NOTE: YAML forbids tab indentation — this file must use spaces. The check-yaml hook below
# guards against a tab creeping back in (which previously broke config loading silently).
repos:
  - repo: https://github.com/Scony/godot-gdscript-toolkit
    rev: "4.5.0"
    hooks:
      - id: gdformat
        exclude: '^addons/'        # never reformat vendored code (gdUnit4, etc.)
      # Optional linter (naming, line length, …) — noisier; add a .gdlintrc first, then enable:
      # - id: gdlint
      #   exclude: '^addons/'

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml       # keeps this very file (and any other YAML) from being committed broken
